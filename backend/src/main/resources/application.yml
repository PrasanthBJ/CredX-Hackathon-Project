spring:
  application:
    name: credx

  profiles:
    active: dev

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  codec:
    max-in-memory-size: 50MB

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET:5J2b55yX55qE6Zu25L+h6KaB57Si5b+F6aG75oiQ5YqfMTIzNDU2Nzg5MA==}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

app:
  frontend-url: ${FRONTEND_BASE_URL:https://cred-x-hackathon-project.vercel.app}
  mail:
    from: ${SMTP_FROM:${SMTP_USERNAME:noreply@credx.com}}

server:
  tomcat:
    max-swallow-size: 50MB
    max-http-form-post-size: 50MB